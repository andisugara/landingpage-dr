services:
  drintan-app:
    build:
      args:
        user: drintan
        uid: 1000
      context: ./
      dockerfile: Dockerfile
    image: drintan
    container_name: drintan-app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
    networks:
      - msa-networks

  drintan-nginx:
    image: nginx:alpine
    container_name: drintan-nginx
    restart: unless-stopped
    ports:
      - 8094:80
    volumes:
      - ./:/var/www
      - ./docker/nginx:/etc/nginx/conf.d/
    networks:
      - msa-networks

networks:
  msa-networks:
    driver: bridge
    name: msa-networks
    external: true
